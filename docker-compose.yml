version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/app/models  
    environment:
      MODEL_PATH: models/my_model.pt
      CONF_THRESHOLD: "0.5"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped